<!DOCTYPE html>
<html>

<head>
    <style>
      .logo-text { color: #000000; }
      .logo-tagline { color: #555555; }
      @media (prefers-color-scheme: dark) {
        .logo-text { color: #ffffff; }
        .logo-tagline { color: #aaaaaa; }
      }
    </style>
    <meta charset="UTF-8">
    <title>Email Signature (Minimal) - Praveen & Partners</title>
</head>

<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;">

    <!-- Minimal Email Signature (Better for Gmail/Outlook compatibility) -->
    <table cellpadding="0" cellspacing="0" border="0"
        style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 13px; line-height: 1.5; color: #1a1a1a;">
        <tr>
            <td style="padding: 0 15px 0 0; vertical-align: top;">
                <!-- Logo Box -->
                <div
                    style="width: 50px; height: 50px; background: #00ed64; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: #000d14; text-align: center; line-height: 50px;">
                    /</div>
            </td>
            <td style="vertical-align: top;">
                <!-- Contact Details -->
                <div style="margin: 0; padding: 0;">
                    <div style="font-size: 16px; font-weight: 700; color: #1a1a1a; margin: 0 0 2px 0;">/PRAVEEN</div>
                    <div
                        style="font-size: 11px; color: #00ed64; font-weight: 600; letter-spacing: 1.2px; margin: 0 0 8px 0; text-transform: uppercase;">
                        Engineering Excellence</div>
                    <div style="font-size: 12px; color: #666666; margin: 0 0 2px 0;">Founder & Technical Director</div>
                    <div style="font-size: 12px; color: #999999; margin: 0 0 8px 0;">Praveen & Partners Limited</div>

                    <div style="margin: 8px 0 0 0;">
                        <div style="margin: 2px 0;">
                            <span style="color: #00ed64;">✉</span>
                            <a href="mailto:praveen@praveenpartners.com"
                                style="color: #1a1a1a; text-decoration: none;">praveen@praveenpartners.com</a>
                        </div>
                        <div style="margin: 2px 0;">
                            <span style="color: #00ed64;">🌐</span>
                            <a href="https://praveenpartners.com"
                                style="color: #1a1a1a; text-decoration: none;">praveenpartners.com</a>
                        </div>
                        <div style="margin: 2px 0;">
                            <span style="color: #00ed64;">📍</span>
                            <span style="color: #1a1a1a;">London, United Kingdom</span>
                        </div>
                    </div>
                </div>
            </td>
        </tr>
    </table>

</body>

</html>
